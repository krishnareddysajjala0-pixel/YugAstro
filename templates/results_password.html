<!DOCTYPE html>
<html lang="te">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ _('పాస్‌వర్డ్ అవసరం - జ్యోతిష్య ఫలితాలు') }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: radial-gradient(circle at 20% 30%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(255, 119, 198, 0.2) 0%, transparent 50%),
                        linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Animated background numbers */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cstyle%3Etext%7Bfont-family:'Segoe UI',sans-serif;font-size:14px;font-weight:bold;opacity:0.4%7D%3C/style%3E%3Ctext x='20' y='40' fill='%23FFD700'%3E6%3C/text%3E%3Ctext x='150' y='30' fill='%23FFD700'%3E6%3C/text%3E%3Ctext x='80' y='160' fill='%23FFD700'%3E6%3C/text%3E%3Ctext x='120' y='80' fill='%23FFD700'%3E6%3C/text%3E%3Ctext x='40' y='120' fill='%23FFD700'%3E6%3C/text%3E%3Ctext x='170' y='140' fill='%23FFD700'%3E6%3C/text%3E%3C/svg%3E");
            background-size: 200px 200px;
            z-index: -1;
            animation: float-up 20s linear infinite;
        }

        @keyframes float-up { from { transform: translateY(0); } to { transform: translateY(-200px); } }

        .login-card {
            background: rgba(20, 19, 50, 0.9);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(15px);
            text-align: center;
        }

        .title {
            font-size: 26px;
            margin-bottom: 10px;
            color: #ffd700;
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.3);
        }

        .subtitle {
            font-size: 15px;
            color: #a0a0ff;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: 600;
            color: #ffd700;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 215, 0, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 18px;
            text-align: center;
            letter-spacing: 5px;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #ffd700;
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ffd700, #ffa500);
            border: none;
            border-radius: 12px;
            color: #0f0c29;
            font-weight: 800;
            font-size: 17px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.4);
        }

        .error-msg {
            background: rgba(255, 77, 77, 0.15);
            color: #ff8e8e;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            border: 1px solid rgba(255, 77, 77, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .home-link {
            display: inline-block;
            margin-top: 25px;
            color: #a0a0ff;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .home-link:hover {
            color: #ffd700;
        }
    </style>
<style>
    /* Language Switcher */
    .language-switcher {
      position: absolute;
      top: 20px;
      left: 20px;
      display: flex;
      flex-direction: column;
      background: var(--card-bg, rgba(15, 23, 42, 0.9));
      padding: 6px;
      border-radius: 20px;
      border: 1px solid var(--card-border, rgba(99, 102, 241, 0.3));
      box-shadow: 0 4px 15px var(--shadow-color, rgba(0,0,0,0.5));
      z-index: 10000;
      backdrop-filter: blur(10px);
      transition: max-height 0.3s ease;
      overflow: hidden;
      max-height: 45px;
      min-width: 45px;
    }

    .language-switcher.expanded {
      max-height: 400px;
      border-radius: 12px;
      padding: 10px;
    }

    .lang-toggle-btn {
      background: transparent;
      border: none;
      font-size: 20px;
      color: var(--text-main, #ffffff);
      padding: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 30px;
      gap: 6px;
      font-weight: bold;
    }

    .lang-options {
      display: flex;
      flex-direction: column;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      margin-top: 8px;
    }

    .language-switcher.expanded .lang-options {
      opacity: 1;
      pointer-events: auto;
    }

    .lang-btn {
      background: transparent;
      border: none;
      font-size: 14px;
      color: var(--text-main, #ffffff);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s ease;
      text-decoration: none;
      display: block;
    }

    .lang-btn:hover {
      background: rgba(120, 120, 120, 0.2);
    }

    .lang-btn.active {
      font-weight: bold;
      background: var(--btn-show-bg, linear-gradient(135deg, #fbbf24, #f59e0b));
      color: var(--btn-show-text, #020617);
    }
</style>
</head>

<body>

  <!-- Language Switcher -->
  <div class="language-switcher print-hide">
    <button class="lang-toggle-btn" onclick="this.parentElement.classList.toggle('expanded')" title="Change Language">
      <i class="fas fa-language"></i>
      <span style="font-size: 14px; margin-left: 2px;">{{ _('భాష') }}</span>
    </button>
    <div class="lang-options">
      <a href="/set_lang/te" class="lang-btn {% if current_lang == 'te' %}active{% endif %}">తెలుగు</a>
      <a href="/set_lang/en" class="lang-btn {% if current_lang == 'en' %}active{% endif %}">English</a>
      <a href="/set_lang/kn" class="lang-btn {% if current_lang == 'kn' %}active{% endif %}">ಕನ್ನಡ</a>
      <a href="/set_lang/hi" class="lang-btn {% if current_lang == 'hi' %}active{% endif %}">हिन्दी</a>
      <a href="/set_lang/ta" class="lang-btn {% if current_lang == 'ta' %}active{% endif %}">தமிழ்</a>
      <a href="/set_lang/ml" class="lang-btn {% if current_lang == 'ml' %}active{% endif %}">മലയാളം</a>
      <a href="/set_lang/or" class="lang-btn {% if current_lang == 'or' %}active{% endif %}">ଓଡ଼ିଆ</a>
    </div>
  </div>

    <div class="login-card">
        <h1 class="title" style="display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 15px;">
            <i class="fas fa-om" style="color: #ffd700;"></i>
            {{ _('జాఫతకము ఫలితాలు') }}
            <i class="fas fa-om" style="color: #ffd700;"></i>
        </h1>
        <p class="subtitle">{{ _('ముందుగా పాస్‌వర్డ్ ఎంటర్ చేయండి') }}</p>

        {% if error %}
        <div class="error-msg">
            <i class="fas fa-exclamation-circle"></i> {{ _('తప్పు పాస్‌వర్డ్. మళ్ళీ ప్రయత్నించండి.') }}
        </div>
        {% endif %}

        <form action="/results" method="POST">
            <div class="input-group">
                <label for="password"><i class="fas fa-lock"></i> {{ _('పాస్‌వర్డ్ (Password):') }}</label>
                <input type="password" id="password" name="password" required autofocus placeholder="***">
            </div>
            <button type="submit" class="btn-submit">
                <i class="fas fa-unlock-alt"></i> {{ _('ఫలితాలను చూడండి') }}
            </button>
        </form>

        <a href="/" class="home-link"><i class="fas fa-arrow-left"></i> {{ _('హోమ్ (Home) కు వెళ్ళండి') }}</a>
    </div>
</body>
</html>
