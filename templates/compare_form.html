<!DOCTYPE html>
<html lang="te">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kundali Comparison</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <meta name="theme-color" content="#FFD700">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: radial-gradient(circle at 20% 30%, rgba(120, 119, 198, 0.3) 0%, transparent 50%), radial-gradient(circle at 80% 70%, rgba(255, 119, 198, 0.2) 0%, transparent 50%), radial-gradient(circle at 40% 80%, rgba(120, 219, 255, 0.15) 0%, transparent 50%), linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      --text-main: #f8fafc;
      --text-muted: #a0a0ff;
      --card-bg: rgba(25, 25, 35, 0.9);
      --card-border: rgba(255, 255, 255, 0.15);
      --input-bg: rgba(15, 12, 41, 0.6);
      --input-border: rgba(102, 126, 234, 0.3);
      --input-focus-border: #00ffcc;
      --input-focus-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
      --btn-show-bg: linear-gradient(135deg, #facc15, #eab308);
      --btn-show-text: #111827;
      --shadow-color: rgba(0, 0, 0, 0.5);
      --header-bg: linear-gradient(45deg, #ffffff, #a0a0ff);
    }

    [data-theme="light"] {
      --bg-primary: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      --text-main: #1e293b;
      --text-muted: #475569;
      --card-bg: rgba(255, 255, 255, 0.92);
      --card-border: rgba(0, 0, 0, 0.1);
      --input-bg: rgba(248, 250, 252, 0.8);
      --input-border: rgba(148, 163, 184, 0.4);
      --input-focus-border: #3b82f6;
      --input-focus-shadow: 0 0 12px rgba(59, 130, 246, 0.3);
      --btn-show-bg: linear-gradient(135deg, #3b82f6, #2563eb);
      --btn-show-text: #ffffff;
      --shadow-color: rgba(0, 0, 0, 0.1);
      --header-bg: linear-gradient(45deg, #0f172a, #3b82f6);
    }

    [data-theme="dark"] {
      --bg-primary: radial-gradient(circle at center, #1e1366 0%, #0a0a0a 100%);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --card-bg: rgba(15, 23, 42, 0.85);
      --card-border: rgba(255, 255, 255, 0.1);
      --input-bg: rgba(30, 41, 59, 0.6);
      --input-border: rgba(255, 255, 255, 0.2);
      --input-focus-border: #a855f7;
      --input-focus-shadow: 0 0 15px rgba(168, 85, 247, 0.5);
      --btn-show-bg: linear-gradient(135deg, #a855f7, #7e22ce);
      --btn-show-text: #ffffff;
      --shadow-color: rgba(0, 0, 0, 0.7);
      --header-bg: linear-gradient(45deg, #ffffff, #c084fc);
    }

    [data-theme="sunset"] {
      --bg-primary: linear-gradient(to top, #ff0844 0%, #ffb199 100%);
      --text-main: #fff0f5;
      --text-muted: #ffe4e1;
      --card-bg: rgba(43, 11, 23, 0.85);
      --card-border: rgba(255, 255, 255, 0.2);
      --input-bg: rgba(43, 11, 23, 0.6);
      --input-border: rgba(255, 255, 255, 0.3);
      --input-focus-border: #FFEFBA;
      --input-focus-shadow: 0 0 15px rgba(255, 239, 186, 0.5);
      --btn-show-bg: linear-gradient(135deg, #fceabb 0%, #f8b500 100%);
      --btn-show-text: #2b0b17;
      --shadow-color: rgba(0, 0, 0, 0.6);
      --header-bg: linear-gradient(135deg, #FFEFBA 0%, #FFFFFF 100%);
    }

    [data-theme="ocean"] {
      --bg-primary: linear-gradient(to top, #09203f 0%, #537895 100%);
      --text-main: #f0fdfa;
      --text-muted: #ccfbf1;
      --card-bg: rgba(9, 32, 63, 0.85);
      --card-border: rgba(255, 255, 255, 0.2);
      --input-bg: rgba(9, 32, 63, 0.6);
      --input-border: rgba(255, 255, 255, 0.3);
      --input-focus-border: #00f2fe;
      --input-focus-shadow: 0 0 15px rgba(0, 242, 254, 0.5);
      --btn-show-bg: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      --btn-show-text: #09203f;
      --shadow-color: rgba(0, 0, 0, 0.6);
      --header-bg: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
    }

    [data-theme="forest"] {
      --bg-primary: linear-gradient(to top, #0ba360 0%, #3cba92 100%);
      --text-main: #f0fdf4;
      --text-muted: #dcfce7;
      --card-bg: rgba(11, 56, 36, 0.85);
      --card-border: rgba(255, 255, 255, 0.2);
      --input-bg: rgba(11, 56, 36, 0.6);
      --input-border: rgba(255, 255, 255, 0.3);
      --input-focus-border: #96e6a1;
      --input-focus-shadow: 0 0 15px rgba(150, 230, 161, 0.5);
      --btn-show-bg: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%);
      --btn-show-text: #0b3824;
      --shadow-color: rgba(0, 0, 0, 0.6);
      --header-bg: linear-gradient(135deg, #f9d423 0%, #ff4e50 100%);
    }

    body {
      font-family: 'Segoe UI', 'Arial', sans-serif;
      background: var(--bg-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-main);
      position: relative;
      overflow-x: hidden;
      padding-bottom: 80px; 
      padding-top: 20px;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cstyle%3Etext%7Bfont-family:'Segoe UI',sans-serif;font-size:14px;font-weight:bold;opacity:0.6%7D%3C/style%3E%3Ctext x='20' y='40' fill='%23FF0000'%3E9%3C/text%3E%3Ctext x='150' y='30' fill='%23FF7F00'%3E6%3C/text%3E%3Ctext x='80' y='160' fill='%23FFFF00'%3E3%3C/text%3E%3Ctext x='120' y='80' fill='%2300FF00'%3E9%3C/text%3E%3Ctext x='40' y='120' fill='%230000FF'%3E6%3C/text%3E%3Ctext x='170' y='140' fill='%238B00FF'%3E3%3C/text%3E%3Ctext x='90' y='20' fill='%23FF0000'%3E6%3C/text%3E%3Ctext x='10' y='180' fill='%23FF7F00'%3E3%3C/text%3E%3C/svg%3E");
      background-size: 200px 200px;
      z-index: -1;
      animation: float-up 20s linear infinite, rainbow-scroll 10s linear infinite;
    }

    @keyframes float-up {
      from { transform: translateY(0); }
      to { transform: translateY(-200px); }
    }

    @keyframes rainbow-scroll {
      from { filter: hue-rotate(0deg); }
      to { filter: hue-rotate(360deg); }
    }

    .container {
      width: 100%;
      max-width: 900px;
      padding: 0 20px;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 25px 50px -12px var(--shadow-color);
      border: 3px solid #ffd700;
      animation: rainbow-border 3s linear infinite;
      position: relative;
      overflow: hidden;
      transform: translateY(0);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    @keyframes rainbow-border {
      0% { border-color: #ff0000; }
      16% { border-color: #ff8000; }
      33% { border-color: #ffff00; }
      50% { border-color: #00ff00; }
      66% { border-color: #0000ff; }
      83% { border-color: #8b00ff; }
      100% { border-color: #ff0000; }
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .header h2 {
      font-size: 32px;
      background: var(--header-bg);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 800;
      letter-spacing: 1px;
      text-shadow: 0 2px 10px rgba(255, 255, 255, 0.2);
    }

    .header .subtitle {
      color: var(--text-muted);
      font-size: 14px;
      opacity: 0.8;
      letter-spacing: 0.5px;
      margin-top: 5px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .persons-wrapper {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .person-box {
      flex: 1;
      min-width: 0;
    }

    .person-divider {
      display: none;
    }

    @media (min-width: 850px) {
      .persons-wrapper {
        flex-direction: row;
        gap: 30px;
      }
      .person-divider {
        display: block;
        width: 2px;
        background: rgba(255, 255, 255, 0.1);
        align-self: stretch;
      }
    }

    .form-group {
      margin-bottom: 0;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #d0d0ff;
      letter-spacing: 0.3px;
    }

    .input-container {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #a0a0ff;
      font-size: 16px;
      z-index: 1;
    }

    input {
      width: 100%;
      padding: 16px 16px 16px 48px;
      border-radius: 14px;
      border: 2px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text-main);
      font-size: 16px;
      font-weight: 500;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3), 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    input:focus {
      outline: none;
      border-color: var(--input-focus-border);
      box-shadow: var(--input-focus-shadow), inset 0 2px 4px rgba(0, 0, 0, 0.3);
      background: var(--card-bg);
      transform: translateY(-2px);
    }

    .place-container {
      grid-column: 1 / -1;
      position: relative;
    }

    .suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      max-height: 200px;
      overflow-y: auto;
      margin-top: 4px;
      border: 1px solid var(--card-border);
      box-shadow: 0 10px 30px var(--shadow-color);
      z-index: 1000;
      display: none;
    }

    .suggestions div {
      padding: 12px 16px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-main);
      border-bottom: 1px solid var(--card-border);
    }

    .suggestions div:last-child {
      border-bottom: none;
    }

    .suggestions div:hover {
      background: var(--input-bg);
      color: var(--input-focus-border);
    }

    .btn-container {
      display: flex;
      justify-content: center;
      margin-top: 30px;
      margin-bottom: 10px;
    }

    .btn {
      padding: 16px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
    }

    .btn-show {
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      color: #111;
      font-size: 18px;
      padding: 16px 36px;
      border-radius: 50px;
      border: 3px solid #ffeb3b;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      overflow: hidden;
      animation: pulse-glow 2s infinite;
      z-index: 1;
      margin: 0 auto;
    }

    .btn-show::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      transition: all 0.5s ease;
      z-index: -1;
    }

    .btn-show:hover::before {
      left: 100%;
    }

    @keyframes pulse-glow {
      0% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7), 0 10px 20px rgba(0, 0, 0, 0.3); }
      70% { box-shadow: 0 0 0 15px rgba(255, 215, 0, 0), 0 10px 20px rgba(0, 0, 0, 0.3); }
      100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0), 0 10px 20px rgba(0, 0, 0, 0.3); }
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }

    .person-box {
        position: relative;
    }
    
    .person-title {
        color: #ffd700;
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 20px;
        text-shadow: 0 2px 5px rgba(255,215,0, 0.3);
        display: flex;
        align-items: center;
        gap: 10px;
    }
    
    .person-title i {
        color: #a855f7;
    }

    /* Loading animation */
    .loading {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(15, 12, 41, 0.9);
      backdrop-filter: blur(10px);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      border-top-color: #667eea;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      color: #a0a0ff;
      font-size: 18px;
      font-weight: 600;
    }
    
    .theme-switcher {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: row-reverse;
      gap: 8px;
      background: var(--card-bg);
      padding: 6px;
      border-radius: 30px;
      border: 1px solid var(--card-border);
      box-shadow: 0 4px 15px var(--shadow-color);
      z-index: 1000;
      backdrop-filter: blur(10px);
      transition: max-width 0.3s ease;
      overflow: hidden;
      max-width: 45px;
    }

    .theme-switcher.expanded {
      max-width: 300px;
    }

    .theme-toggle-btn {
      background: transparent;
      border: none;
      font-size: 20px;
      padding: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 30px;
    }

    .theme-options {
      display: flex;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .theme-switcher.expanded .theme-options {
      opacity: 1;
      pointer-events: auto;
    }

    .theme-btn {
      background: transparent;
      border: none;
      font-size: 16px;
      padding: 8px;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.3s ease;
      opacity: 0.5;
    }

    .theme-btn.active, .theme-btn:hover {
      opacity: 1;
    }
    /* Bottom Navbar */
    .fixed-bottom-bar-nav {
        position: fixed; bottom: 0; left: 0; width: 100%;
        background: rgba(15, 12, 41, 0.95);
        backdrop-filter: blur(10px);
        border-top: 1px solid rgba(255, 255, 255, 0.15);
        display: flex; justify-content: space-around;
        padding: 12px 0; z-index: 10000;
    }
    .nav-item {
        display: flex; flex-direction: column; align-items: center;
        color: #a0a0ff; text-decoration: none; font-size: 12px; gap: 5px;
        transition: all 0.3s ease;
    }
    .nav-item.active { color: #ffd700; transition: all 0.3s ease; }
    .nav-item i { font-size: 20px; transition: all 0.3s ease; }
    .nav-item:hover { color: #fff; }

    .nav-home i, .nav-panch i, .nav-cal i, .theme-toggle-btn { animation: nav-rainbow 3s linear infinite !important; }

    @keyframes nav-rainbow {
        0%   { color: #ff4444; text-shadow: 0 0 8px rgba(255,68,68,0.6); }
        20%  { color: #ff9900; text-shadow: 0 0 8px rgba(255,153,0,0.6); }
        40%  { color: #ffff00; text-shadow: 0 0 8px rgba(255,255,0,0.6); }
        60%  { color: #44ff44; text-shadow: 0 0 8px rgba(68,255,68,0.6); }
        80%  { color: #4488ff; text-shadow: 0 0 8px rgba(68,136,255,0.6); }
        100% { color: #ff4444; text-shadow: 0 0 8px rgba(255,68,68,0.6); }
    }
    /* Loading Overlay */
    #loading-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(10, 10, 30, 0.95);
        display: none; flex-direction: column; align-items: center; justify-content: center;
        z-index: 100000; color: #ffd700; font-family: 'Segoe UI', cursive;
    }
    .loader-astro {
        width: 60px; height: 60px;
        border: 5px solid rgba(255,215,0,0.2);
        border-top: 5px solid #ffd700;
        border-radius: 50%;
        animation: spin 1s linear infinite, rainbow-border 3s linear infinite;
        margin-bottom: 20px;
    }
  </style>
</head>

<body>

  <div class="theme-switcher" id="themeSwitcher">
    <button class="theme-toggle-btn" onclick="toggleThemeMenu()" title="Themes" style="outline:none;">🎨</button>
    <div class="theme-options">
      <button class="theme-btn active" data-theme-btn="default" onclick="setTheme('default')" title="Cosmic Mode">✨</button>
      <button class="theme-btn" data-theme-btn="light" onclick="setTheme('light')" title="Day Mode">☀️</button>
      <button class="theme-btn" data-theme-btn="dark" onclick="setTheme('dark')" title="Deep Dark Mode">🌙</button>
      <button class="theme-btn" data-theme-btn="sunset" onclick="setTheme('sunset')" title="Sunset Mode">🌅</button>
      <button class="theme-btn" data-theme-btn="ocean" onclick="setTheme('ocean')" title="Ocean Mode">🌊</button>
      <button class="theme-btn" data-theme-btn="forest" onclick="setTheme('forest')" title="Forest Mode">🌲</button>
    </div>
  </div>

  <div class="container">
    <div class="card">

      <div class="header">
        <h2>కుండలి పోలిక</h2>
        <div class="subtitle">ఇద్దరు వ్యక్తుల కుండలులను సరిపోల్చండి</div>
      </div>

      <form action="/compare_results" method="post" id="mainForm">

        <div class="persons-wrapper">
          <!-- PERSON 1 -->
          <div class="person-box">
            <h3 class="person-title"><i class="fas fa-user-astronaut"></i> మొదటి వ్యక్తి</h3>
            <div class="form-grid">
              <div class="form-group">
                <label for="name1" class="required-field"><i class="fas fa-user"></i> పేరు</label>
                <div class="input-container">
                  <div class="input-icon"><i class="fas fa-user-circle"></i></div>
                  <input type="text" id="name1" name="name1" required placeholder="మొదటి వ్యక్తి పేరు">
                </div>
              </div>
              <div class="form-group">
                <label for="dob1" class="required-field"><i class="fas fa-calendar-alt"></i> జన్మ తేది</label>
                <div class="input-container">
                  <div class="input-icon"><i class="fas fa-birthday-cake"></i></div>
                  <input type="date" id="dob1" name="dob1" required>
                </div>
              </div>
              <div class="form-group">
                <label for="tob1" class="required-field"><i class="fas fa-clock"></i> జన్మ సమయం</label>
                <div class="input-container">
                  <div class="input-icon"><i class="fas fa-history"></i></div>
                  <input type="time" id="tob1" name="tob1" required>
                </div>
              </div>
              <div class="form-group place-container">
                <label for="place1" class="required-field"><i class="fas fa-map-marker-alt"></i> జన్మ స్థలం</label>
                <div class="input-container">
                  <div class="input-icon"><i class="fas fa-globe-asia"></i></div>
                  <input type="text" class="place-input" id="place1" name="place1" autocomplete="off" required placeholder="గ్రామం, నగరం, రాష్ట్రం">
                </div>
                <div class="suggestions" id="suggestions1"></div>
                <input type="hidden" name="lat1" id="lat1">
                <input type="hidden" name="lon1" id="lon1">
              </div>
            </div>
          </div>
          
          <div class="person-divider"></div>

          <!-- PERSON 2 -->
          <div class="person-box">
            <h3 class="person-title"><i class="fas fa-user-astronaut"></i> రెండవ వ్యక్తి</h3>
            <div class="form-grid">
            <div class="form-group">
                <label for="name2" class="required-field"><i class="fas fa-user"></i> పేరు</label>
                <div class="input-container">
                <div class="input-icon"><i class="fas fa-user-circle"></i></div>
                <input type="text" id="name2" name="name2" required placeholder="రెండవ వ్యక్తి పేరు">
                </div>
            </div>
            <div class="form-group">
                <label for="dob2" class="required-field"><i class="fas fa-calendar-alt"></i> జన్మ తేది</label>
                <div class="input-container">
                <div class="input-icon"><i class="fas fa-birthday-cake"></i></div>
                <input type="date" id="dob2" name="dob2" required>
                </div>
            </div>
            <div class="form-group">
                <label for="tob2" class="required-field"><i class="fas fa-clock"></i> జన్మ సమయం</label>
                <div class="input-container">
                <div class="input-icon"><i class="fas fa-history"></i></div>
                <input type="time" id="tob2" name="tob2" required>

                <label for="place2" class="required-field"><i class="fas fa-map-marker-alt"></i> జన్మ స్థలం</label>
                <div class="input-container">
                <div class="input-icon"><i class="fas fa-globe-asia"></i></div>
                <input type="text" class="place-input" id="place2" name="place2" autocomplete="off" required placeholder="గ్రామం, నగరం, రాష్ట్రం">
                </div>
                <div class="suggestions" id="suggestions2"></div>
                <input type="hidden" name="lat2" id="lat2">
                <input type="hidden" name="lon2" id="lon2">
            </div>
          </div>
          </div>
        </div>

        <div class="btn-container">
          <button type="submit" class="btn btn-show">
            <span class="btn-icon">⚖️</span>
            కుండలి పోల్చండి

  <script>
    function toggleThemeMenu() { document.getElementById('themeSwitcher').classList.toggle('expanded'); }
    function setTheme(themeName) {
      if (themeName === 'default') document.documentElement.removeAttribute('data-theme');
      else document.documentElement.setAttribute('data-theme', themeName);
      localStorage.setItem('preferred-theme', themeName);
      document.querySelectorAll('.theme-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.getAttribute('data-theme-btn') === themeName) btn.classList.add('active');
      });
    }
    const savedTheme = localStorage.getItem('preferred-theme') || 'default';
    setTheme(savedTheme);

    function setupLocation(placeId, suggestionsId, latId, lonId) {
        const placeInput = document.getElementById(placeId);
        const suggestions = document.getElementById(suggestionsId);
        const latInput = document.getElementById(latId);
        const lonInput = document.getElementById(lonId);
        let timeout = null;
        let controller = null;

        placeInput.addEventListener("input", () => {
            const q = placeInput.value.trim();
            if (timeout) clearTimeout(timeout);
            if (q.length < 2) {
                suggestions.style.display = "none";
                return;
            }
            timeout = setTimeout(async () => {
                if (controller) controller.abort();
                controller = new AbortController();
                const url = `https://nominatim.openstreetmap.org/search?format=json&limit=8&addressdetails=1&q=${encodeURIComponent(q)}`;
                try {
                const res = await fetch(url, { signal: controller.signal });
                const data = await res.json();
                suggestions.innerHTML = "";
                if (data.length === 0) {
                    suggestions.innerHTML = `<div style="color: #888; font-style: italic;">ఫలితాలు లేవు</div>`;
                } else {
                    data.forEach(p => {
                    const div = document.createElement("div");
                    div.innerHTML = `<div style="font-weight: 600; color: #fff;">${p.display_name.split(',')[0]}</div><div style="font-size: 12px; color: #a0a0ff;">${p.display_name.split(',').slice(1).join(',').trim()}</div>`;
                    div.onclick = () => {
                        placeInput.value = p.display_name;
                        latInput.value = p.lat;
                        lonInput.value = p.lon;
                        suggestions.style.display = "none";
                    };
                    suggestions.appendChild(div);
                    });
                }
                suggestions.style.display = "block";
                } catch (e) {}
            }, 300);
        });

        document.addEventListener("click", (e) => {
            if (!placeInput.contains(e.target) && !suggestions.contains(e.target)) {
                suggestions.style.display = "none";
            }
        });
    }

    setupLocation("place1", "suggestions1", "lat1", "lon1");
    setupLocation("place2", "suggestions2", "lat2", "lon2");

    document.getElementById("mainForm").addEventListener("submit", (e) => {
        let valid = true;
        if (!document.getElementById("lat1").value) {
            document.getElementById("place1").style.borderColor = "#ff6b6b";
            valid = false;
        }
        if (!document.getElementById("lat2").value) {
            document.getElementById("place2").style.borderColor = "#ff6b6b";
            valid = false;
        }
        if (!valid) {
            e.preventDefault();
            alert("దయచేసి రెండు స్థానాలను జాబితా నుండి ఎంచుకోండి.");
            return;
        }
        document.getElementById("loading-overlay").style.display = 'flex';
    });
    
    // Set default Date and Time
    const now = new Date();
    const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    
    document.getElementById('dob1').value = dateStr;
    document.getElementById('tob1').value = timeStr;
    document.getElementById('dob2').value = dateStr;
    document.getElementById('tob2').value = timeStr;

    // Navigation auto-loader
    function showLoader() {
        document.getElementById('loading-overlay').style.display = 'flex';
    }
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', function(e) {
            if(!this.href.includes('#')) showLoader();
        });
    });
  </script>
</body>
